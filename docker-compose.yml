services:
  db:
    image: mariadb:10.6
    container_name: ventas-db
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: ventas_db
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: ventas-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/ventas_db?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      APP_ENCRYPTION_SECRET: MiClaveSecreta
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
