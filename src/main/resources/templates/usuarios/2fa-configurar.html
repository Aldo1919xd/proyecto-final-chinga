<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Configurar 2FA')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2>Configurar Autenticacion de Dos Factores</h2>
      <p class="text-muted">Escanea el codigo QR con tu app Google Authenticator y luego ingresa el codigo de 6 digitos para verificar.</p>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

      <div class="card-form text-center mb-4">
        <div id="qrcode" class="mb-3 d-inline-block"></div>

        <div class="mb-3">
          <label class="form-label">O puedes ingresar manualmente este codigo:</label>
          <div class="input-group">
            <input type="text" class="form-control text-center font-monospace" th:value="${secret}" readonly id="secretKey">
            <button type="button" class="btn btn-outline-primary" onclick="copiarSecreto()">Copiar</button>
          </div>
        </div>
      </div>

      <form th:action="@{/usuarios/2fa/verificar}" method="post" class="card-form">
        <input type="hidden" name="secret" th:value="${secret}">
        <div class="mb-3">
          <label class="form-label">Codigo de verificacion (6 digitos)</label>
          <input type="text" name="codigo" class="form-control text-center solo-numeros"
                 placeholder="000000" required maxlength="6" minlength="6"
                 inputmode="numeric" autocomplete="one-time-code">
          <div class="invalid-feedback">Ingrese el codigo de 6 digitos de su app</div>
        </div>
        <button type="submit" class="btn btn-primary w-100">Verificar y Activar</button>
      </form>

      <div class="text-center mt-3">
        <a href="/usuarios" class="btn btn-secondary">Cancelar</a>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<script>
  var uri = '[[${uri}]]';
  new QRCode(document.getElementById('qrcode'), {
    text: uri,
    width: 220,
    height: 220,
    colorDark: '#286983',
    colorLight: '#faf4ed',
    correctLevel: QRCode.CorrectLevel.H
  });

  function copiarSecreto() {
    var input = document.getElementById('secretKey');
    input.select();
    navigator.clipboard.writeText(input.value);
    var btn = input.nextElementSibling;
    btn.textContent = 'Copiado!';
    setTimeout(function () { btn.textContent = 'Copiar'; }, 2000);
  }
</script>

<div th:replace="fragmentos :: scripts"></div>
</body>
</html>
