<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Usuarios')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <div class="page-header">
    <h2>Usuarios</h2>
    <div class="d-flex gap-2">
      <a href="/usuarios/2fa/estado" class="btn btn-outline-info">Mi 2FA</a>
      <a th:if="${permisosMap.containsKey('Usuarios') and permisosMap.get('Usuarios').crear}" href="/usuarios/nuevo" class="btn btn-primary">Nuevo Usuario</a>
    </div>
  </div>
  <div class="table-wrapper">
    <table class="table table-bordered table-hover">
      <thead>
        <tr>
          <th>ID</th>
          <th>Usuario</th>
          <th>Rol</th>
          <th>2FA</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="u : ${usuarios}">
          <td th:text="${u.idUsuario}">1</td>
          <td th:text="${u.usuario}">usuario</td>
          <td th:text="${u.rol.nombreRol}">Rol</td>
          <td>
            <span th:if="${u.secretKey2fa != null and !u.secretKey2fa.isEmpty()}" class="badge bg-success">Activo</span>
            <span th:unless="${u.secretKey2fa != null and !u.secretKey2fa.isEmpty()}" class="badge bg-secondary">Inactivo</span>
          </td>
          <td>
            <span th:if="${u.estado}" class="badge bg-success">Activo</span>
            <span th:unless="${u.estado}" class="badge bg-danger">Inactivo</span>
          </td>
          <td>
            <a th:if="${permisosMap.containsKey('Usuarios') and permisosMap.get('Usuarios').editar}" th:href="@{/usuarios/editar/{id}(id=${u.idUsuario})}" class="btn btn-sm btn-outline-primary">Editar</a>
            <a th:if="${permisosMap.containsKey('Usuarios') and permisosMap.get('Usuarios').eliminar}" th:href="@{/usuarios/eliminar/{id}(id=${u.idUsuario})}" class="btn btn-sm btn-outline-danger"
               onclick="return confirm('Eliminar este usuario?')">Eliminar</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div th:replace="fragmentos :: scripts"></div>
</body>
</html>
