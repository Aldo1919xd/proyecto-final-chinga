<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Desactivar 2FA')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card-form text-center">
        <div style="font-size:2.5rem;margin-bottom:0.75rem;">&#x26A0;&#xFE0F;</div>
        <h3>Desactivar 2FA</h3>
        <p class="text-muted">Ingresa el codigo de 6 digitos de tu app Google Authenticator para confirmar la desactivacion.</p>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/usuarios/2fa/desactivar}" method="post">
          <div class="mb-3">
            <input type="text" name="codigo" class="form-control text-center form-control-lg solo-numeros"
                   placeholder="000000" required maxlength="6" minlength="6"
                   inputmode="numeric" autocomplete="one-time-code" autofocus>
            <div class="invalid-feedback">Ingrese el codigo de 6 digitos</div>
          </div>
          <button type="submit" class="btn btn-danger w-100 btn-lg">Desactivar 2FA</button>
        </form>

        <a href="/usuarios/2fa/estado" class="btn btn-secondary mt-3">Cancelar</a>
      </div>
    </div>
  </div>
</div>

<div th:replace="fragmentos :: scripts"></div>
</body>
</html>
