<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Cambiar Password')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2>Cambiar Password</h2>
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
      <div th:if="${param.exito}" class="alert alert-success">Password cambiada correctamente</div>
      <form th:action="@{/usuarios/cambiar-password}" method="post" class="card-form">
        <div class="mb-3">
          <label class="form-label">Nueva Password</label>
          <input type="password" name="passwordNueva" class="form-control" required minlength="6" data-val="password">
          <div class="invalid-feedback"></div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar Password</label>
          <input type="password" name="passwordConfirmacion" class="form-control" required>
          <div class="invalid-feedback"></div>
        </div>
        <button type="submit" class="btn btn-primary">Cambiar</button>
      </form>
    </div>
  </div>
</div>

<div th:replace="fragmentos :: scripts"></div>
</body>
</html>
