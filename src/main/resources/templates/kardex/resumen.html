<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Kardex')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <h2>KARDEX - RESUMEN POR PRODUCTO</h2>
  
  <form action="/kardex" method="get" class="row g-3 align-items-center mb-4">
    <div class="col-auto">
      <label class="col-form-label">Producto:</label>
    </div>
    <div class="col-md-4">
      <select name="productoId" class="form-select" required>
        <option value="">-- Seleccione Producto --</option>
        <option th:each="p : ${productos}" th:value="${p.codProducto}" th:text="${p.codProducto + ' - ' + p.nombreProducto + ' (Cant x Item: ' + p.cantidadItem + ')'}" th:selected="${param.productoId != null and param.productoId[0] == p.codProducto.toString()}"></option>
      </select>
    </div>
    <div class="col-auto">
      <button type="submit" class="btn btn-primary">Buscar</button>
    </div>
  </form>

  <div th:if="${productoSeleccionado != null}">
    <div class="row text-center mb-4">
      <div class="col-md-4 mb-2">
        <div class="card bg-light">
          <div class="card-body">
            <h6 class="text-success">Saldo Unidad</h6>
            <h4 th:text="${productoSeleccionado.cantidadUnidad}">0</h4>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-2">
        <div class="card bg-light">
          <div class="card-body">
            <h6 class="text-primary">Saldo Fracción</h6>
            <h4 th:text="${productoSeleccionado.cantidadFraccion}">0</h4>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-2">
        <div class="card bg-light">
          <div class="card-body">
            <h6 class="text-info">Cant x Item</h6>
            <h4 th:text="${productoSeleccionado.cantidadItem}">1</h4>
          </div>
        </div>
      </div>
    </div>
    
    <div class="table-wrapper table-responsive-stack">
      <table class="table table-bordered table-hover text-center">
        <thead class="table-light">
          <tr>
            <th>Fecha</th>
            <th>Tipo Oper.</th>
            <th>Documento</th>
            <th>Cant x Item</th>
            <th class="text-success">Entrada (U)</th>
            <th class="text-danger">Salida (U)</th>
            <th class="text-success">Entrada (F)</th>
            <th class="text-danger">Salida (F)</th>
            <th>Saldo U</th>
            <th>Saldo F</th>
            <th>Obs.</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="k : ${movimientos}">
            <td data-label="Fecha" th:text="${#temporals.format(k.fechaHora, 'dd/MM/yyyy HH:mm')}">Fecha</td>
            <td data-label="Tipo Oper." th:text="${k.tipoOperacion.descripcion}">Oper</td>
            <td data-label="Documento" th:text="${k.codDocumento}">Doc</td>
            <td data-label="Cant x Item" th:text="${productoSeleccionado.cantidadItem}">1</td>
            
            <td data-label="Entrada (U)" class="text-success" th:text="${(k.tipoOperacion.codTipoOperacion == 1 or (k.tipoOperacion.codTipoOperacion == 5 and k.cantidadFinal gt k.cantidadInicial)) and (k.observacion != null and k.observacion.startsWith('[U]')) ? k.cantidadMovimiento : 0}">0</td>
            <td data-label="Salida (U)" class="text-danger" th:text="${(k.tipoOperacion.codTipoOperacion == 2 or (k.tipoOperacion.codTipoOperacion == 5 and k.cantidadFinal lt k.cantidadInicial)) and (k.observacion != null and k.observacion.startsWith('[U]')) ? k.cantidadMovimiento : 0}">0</td>
            
            <td data-label="Entrada (F)" class="text-success" th:text="${(k.tipoOperacion.codTipoOperacion == 1 or (k.tipoOperacion.codTipoOperacion == 5 and k.cantidadFinal gt k.cantidadInicial)) and (k.observacion != null and k.observacion.startsWith('[F]')) ? k.cantidadMovimiento : 0}">0</td>
            <td data-label="Salida (F)" class="text-danger" th:text="${(k.tipoOperacion.codTipoOperacion == 2 or (k.tipoOperacion.codTipoOperacion == 5 and k.cantidadFinal lt k.cantidadInicial)) and (k.observacion != null and k.observacion.startsWith('[F]')) ? k.cantidadMovimiento : 0}">0</td>
            
            <td data-label="Saldo U" th:text="${k.saldoUnitario}">0</td>
            <td data-label="Saldo F" th:text="${k.saldoFraccionario}">0</td>
            <td data-label="Obs." th:text="${k.observacion}"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<div th:replace="fragmentos :: scripts"></div>
</body>
</html>
