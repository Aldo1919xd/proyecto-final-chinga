<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Registrar Venta')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <h2>Registrar Venta</h2>
  <div th:if="${param.exito}" class="alert alert-success">Venta registrada correctamente</div>
  <div th:if="${param.error != null and param.error[0] == 'sinProductos'}" class="alert alert-danger">Debe agregar al menos un producto a la venta</div>
  <form th:action="@{/ventas/guardar}" method="post" class="card-form">
    <div class="row mb-3">
      <div class="col">
        <label class="form-label">Cliente</label>
        <div class="input-group">
          <input type="text" id="clienteNombre" class="form-control" readonly placeholder="Seleccione un cliente..." required>
          <input type="hidden" name="cliente.codCliente" id="clienteId">
          <button type="button" class="btn btn-outline-primary" data-bs-toggle="modal" data-bs-target="#modalCliente">Buscar</button>
        </div>
      </div>
      <div class="col">
        <label class="form-label">Tipo Documento</label>
        <select name="tipoDocumento.codTipoDocumento" class="form-select" required>
          <option value="1">DNI</option>
          <option value="2">RUC</option>
        </select>
      </div>
    </div>
    <h5 class="section-title">Detalle de Productos</h5>
    <div class="table-wrapper mb-3">
      <table class="table table-bordered" id="tablaDetalle">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Tipo</th>
            <th>Accion</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>
              <input type="text" class="form-control producto-nombre" readonly placeholder="Seleccione producto...">
              <input type="hidden" name="productoId" class="producto-id">
            </td>
            <td><input type="number" name="cantidad" class="form-control" value="1" min="1"></td>
            <td>
              <select name="tipoVenta" class="form-select">
                <option value="UNIDAD">Unidad</option>
                <option value="FRACCION">Fraccion</option>
              </select>
            </td>
            <td>
              <button type="button" class="btn btn-sm btn-outline-primary btn-buscar-producto" data-bs-toggle="modal" data-bs-target="#modalProducto">Buscar</button>
              <button type="button" class="btn btn-sm btn-outline-danger" onclick="this.closest('tr').remove()">Quitar</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="d-flex gap-2 mb-3">
      <button type="button" class="btn btn-outline-primary btn-sm" onclick="agregarFila()">Agregar Producto</button>
    </div>
    <button type="submit" class="btn btn-primary">Registrar Venta</button>
  </form>
</div>

<!-- Modal Cliente -->
<div class="modal fade" id="modalCliente" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Buscar Cliente</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="input-group mb-3">
          <input type="text" id="buscarClienteInput" class="form-control" placeholder="Nombre o documento...">
          <button type="button" class="btn btn-primary" id="btnBuscarCliente">Buscar</button>
        </div>
        <div class="table-wrapper">
          <table class="table table-bordered table-hover">
            <thead>
              <tr>
                <th>Codigo</th>
                <th>Nombre</th>
                <th>Documento</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="resultadoClientes"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal Producto -->
<div class="modal fade" id="modalProducto" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Buscar Producto</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="input-group mb-3">
          <input type="text" id="buscarProductoInput" class="form-control" placeholder="Nombre del producto...">
          <button type="button" class="btn btn-primary" id="btnBuscarProducto">Buscar</button>
        </div>
        <div class="table-wrapper">
          <table class="table table-bordered table-hover">
            <thead>
              <tr>
                <th>Codigo</th>
                <th>Nombre</th>
                <th>P. Unitario</th>
                <th>Stock Und</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="resultadoProductos"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
var filaProductoActual = null;

function agregarFila() {
  var table = document.getElementById('tablaDetalle').getElementsByTagName('tbody')[0];
  var firstRow = table.getElementsByTagName('tr')[0];
  var newRow = firstRow.cloneNode(true);
  var inputs = newRow.getElementsByTagName('input');
  for (var i = 0; i < inputs.length; i++) { inputs[i].value = ''; }
  var selects = newRow.getElementsByTagName('select');
  for (var i = 0; i < selects.length; i++) { selects[i].selectedIndex = 0; }
  table.appendChild(newRow);
}

document.addEventListener('DOMContentLoaded', function () {

  // Cliente search
  document.getElementById('btnBuscarCliente').addEventListener('click', function () {
    buscarClientes(document.getElementById('buscarClienteInput').value);
  });
  document.getElementById('buscarClienteInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btnBuscarCliente').click(); }
  });

  // Producto search
  document.getElementById('btnBuscarProducto').addEventListener('click', function () {
    buscarProductos(document.getElementById('buscarProductoInput').value);
  });
  document.getElementById('buscarProductoInput').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') { e.preventDefault(); document.getElementById('btnBuscarProducto').click(); }
  });

  // Modal producto: track which row triggered it
  document.getElementById('modalProducto').addEventListener('show.bs.modal', function (e) {
    var btn = e.relatedTarget;
    if (btn && btn.classList.contains('btn-buscar-producto')) {
      filaProductoActual = btn.closest('tr');
    }
  });

  // Load initial data
  buscarClientes('');
  buscarProductos('');
});

function buscarClientes(q) {
  fetch('/clientes/buscar?q=' + encodeURIComponent(q))
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var tbody = document.getElementById('resultadoClientes');
      tbody.innerHTML = '';
      data.forEach(function (c) {
        var tr = document.createElement('tr');
        tr.style.cursor = 'pointer';
        tr.innerHTML = '<td>' + c.codCliente + '</td><td>' + (c.nombreCliente || '') + '</td><td>' + c.numeroDocumento + '</td><td><button class="btn btn-sm btn-outline-primary">Seleccionar</button></td>';
        tr.addEventListener('click', function () {
          document.getElementById('clienteId').value = c.codCliente;
          document.getElementById('clienteNombre').value = (c.nombreCliente || '') + ' - ' + c.numeroDocumento;
          bootstrap.Modal.getInstance(document.getElementById('modalCliente')).hide();
        });
        tbody.appendChild(tr);
      });
    });
}

function buscarProductos(q) {
  fetch('/productos/buscar?q=' + encodeURIComponent(q))
    .then(function (r) { return r.json(); })
    .then(function (data) {
      var tbody = document.getElementById('resultadoProductos');
      tbody.innerHTML = '';
      data.forEach(function (p) {
        var tr = document.createElement('tr');
        tr.style.cursor = 'pointer';
        tr.innerHTML = '<td>' + p.codProducto + '</td><td>' + p.nombreProducto + '</td><td>' + p.precioUnitario + '</td><td>' + p.cantidadUnidad + '</td><td><button class="btn btn-sm btn-outline-primary">Seleccionar</button></td>';
        tr.addEventListener('click', function () {
          var targetRow = filaProductoActual || document.querySelector('#tablaDetalle tbody tr:last-child');
          targetRow.querySelector('.producto-id').value = p.codProducto;
          targetRow.querySelector('.producto-nombre').value = p.nombreProducto;
          filaProductoActual = null;
          bootstrap.Modal.getInstance(document.getElementById('modalProducto')).hide();
        });
        tbody.appendChild(tr);
      });
    });
}
</script>

<div th:replace="fragmentos :: scripts"></div>
</body>
</html>
