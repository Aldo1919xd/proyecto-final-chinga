<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Cliente')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h2 th:text="${cliente.codCliente != null ? 'Editar Cliente' : 'Nuevo Cliente'}">Formulario</h2>
      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
      <form th:action="@{/clientes/guardar}" method="post" class="card-form" th:object="${cliente}">
        <input type="hidden" name="codCliente" th:value="*{codCliente}">
        <input type="hidden" name="estado" th:value="*{estado != null ? estado : true}">

        <h6 class="section-title">Documento</h6>
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">Tipo Documento</label>
            <select name="tipoDocumento.codTipoDocumento" class="form-select tipo-doc-select" required>
              <option value="">Seleccione...</option>
              <option th:each="td : ${tiposDocumento}" th:value="${td.codTipoDocumento}" th:text="${td.descripcion}"
                      th:selected="${cliente.tipoDocumento != null && cliente.tipoDocumento.codTipoDocumento == td.codTipoDocumento}"></option>
            </select>
            <div class="invalid-feedback"></div>
          </div>
          <div class="col-md-8">
            <label class="form-label">Numero Documento</label>
            <input type="text" name="numeroDocumento" class="form-control solo-numeros"
                   th:value="*{numeroDocumento}" required maxlength="15"
                   data-val="numeroDocumento">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('numeroDocumento')}" th:errors="*{numeroDocumento}"></div>
          </div>
        </div>

        <h6 class="section-title mt-4">Datos del Cliente</h6>
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Nombre Cliente</label>
            <input type="text" name="nombreCliente" class="form-control solo-letras" th:value="*{nombreCliente}" maxlength="150">
            <div class="invalid-feedback" th:if="${#fields.hasErrors('nombreCliente')}" th:errors="*{nombreCliente}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Razon Social</label>
            <input type="text" name="razonSocial" class="form-control" th:value="*{razonSocial}" maxlength="150">
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-md-4">
            <label class="form-label">Fecha Nacimiento</label>
            <input type="date" name="fechaNacimiento" class="form-control" th:value="*{fechaNacimiento}"
                   data-val="fechaPasada">
            <div class="invalid-feedback"></div>
          </div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary">Guardar</button>
          <a href="/clientes" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>

<div th:replace="fragmentos :: scripts"></div>
</body>
</html>
