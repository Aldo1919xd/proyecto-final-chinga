<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(titulo)">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${titulo}">App Ventas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/css/estilos.css" rel="stylesheet">
  <script src="/js/validaciones.js"></script>
</head>

<body>

<nav th:fragment="navbar" class="navbar navbar-expand-lg mb-0">
  <div class="container">
    <a class="navbar-brand" href="/inicio">App Ventas</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
      aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Seguridad
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/usuarios">Usuarios</a></li>
            <li><a class="dropdown-item" href="/roles">Roles</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><a class="dropdown-item" href="/usuarios/cambiar-password">Cambiar Password</a></li>
          </ul>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
            Maestras
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="/clientes">Clientes</a></li>
            <li><a class="dropdown-item" href="/categorias">Categorias</a></li>
            <li><a class="dropdown-item" href="/productos">Productos</a></li>
          </ul>
        </li>
        <li class="nav-item"><a class="nav-link" href="/ingresos">Ingresos</a></li>
        <li class="nav-item"><a class="nav-link" href="/ventas">Ventas</a></li>
        <li class="nav-item"><a class="nav-link" href="/kardex">Kardex</a></li>
        <li class="nav-item"><a class="nav-link" href="/auditoria">Auditoría</a></li>
      </ul>
      <form class="d-flex" th:action="@{/logout}" method="post">
        <button class="btn btn-outline-primary btn-sm" type="submit">Cerrar Sesion</button>
      </form>
    </div>
  </div>
</nav>

<div th:fragment="scripts">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</div>

</body>
</html>
