<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Ingreso de Productos')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <h2>Registrar Ingreso de Producto</h2>
      <div th:if="${param.exito}" class="alert alert-success">Ingreso registrado correctamente</div>
      <form th:action="@{/ingresos/guardar}" method="post" class="card-form">
        <div class="row mb-3">
          <div class="col-md-12">
            <label class="form-label">Producto</label>
            <select name="producto.codProducto" class="form-select" required>
              <option value="">Seleccione...</option>
              <option th:each="p : ${productos}" th:value="${p.codProducto}" th:text="${p.nombreProducto + ' (Cant x Item: ' + p.cantidadItem + ')'}"></option>
            </select>
            <div class="invalid-feedback"></div>
          </div>
        </div>

        <h6 class="section-title">Cantidades</h6>
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Unidades</label>
            <input type="number" name="cantidadUnidad" class="form-control" value="0" min="0" data-val="positivo">
            <div class="invalid-feedback"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Fracciones</label>
            <input type="number" name="cantidadFraccion" class="form-control" value="0" min="0" data-val="positivo">
            <div class="invalid-feedback"></div>
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Observacion</label>
          <input type="text" name="observacion" class="form-control" maxlength="200">
        </div>

        <button type="submit" class="btn btn-primary">Registrar Ingreso</button>
      </form>
    </div>
  </div>
</div>

<div th:replace="fragmentos :: scripts"></div>
</body>
</html>
