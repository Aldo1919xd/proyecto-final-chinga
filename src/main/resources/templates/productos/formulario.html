<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Producto')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <div class="row justify-content-center">
    <div class="col-md-10">
      <h2 th:text="${producto.codProducto != null ? 'Editar Producto' : 'Nuevo Producto'}">Formulario</h2>
      <form th:action="@{/productos/guardar}" method="post" class="card-form">
        <input type="hidden" name="codProducto" th:value="${producto.codProducto}">
        <input type="hidden" name="estado" th:value="${producto.estado != null ? producto.estado : true}">
        <input type="hidden" name="version" th:value="${producto.version}">

        <h6 class="section-title">Identificacion</h6>
        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label">Nombre Producto</label>
            <input type="text" name="nombreProducto" class="form-control sin-especiales"
                   th:value="${producto.nombreProducto}" required maxlength="120">
            <div class="invalid-feedback"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Categoria</label>
            <select name="categoria.codCategoria" class="form-select" required>
              <option value="">Seleccione...</option>
              <option th:each="c : ${categorias}" th:value="${c.codCategoria}" th:text="${c.nombreCategoria}"
                      th:selected="${producto.categoria != null && producto.categoria.codCategoria == c.codCategoria}"></option>
            </select>
            <div class="invalid-feedback"></div>
          </div>
        </div>

        <h6 class="section-title">Tipo de Producto</h6>
        <div class="row mb-3">
          <div class="col-md-12">
            <div class="form-check">
              <input type="checkbox" id="esPack" name="esPack" class="form-check-input" value="true"
                     th:checked="${producto.esPack}">
              <label for="esPack" class="form-check-label">¿Es un pack?</label>
            </div>
          </div>
        </div>

        <div id="packSection" th:style="${producto.esPack} ? '' : 'display:none'">
          <h6 class="section-title">Composicion del Pack</h6>
          <div class="table-wrapper mb-3">
            <table class="table table-bordered" id="composicionTable">
              <thead>
                <tr>
                  <th>Producto</th>
                  <th style="width:120px">Cantidad</th>
                  <th style="width:100px">P. Unit.</th>
                  <th style="width:120px">Subtotal</th>
                  <th style="width:60px"></th>
                </tr>
              </thead>
              <tbody id="composicionBody">
                <tr th:each="c, iter : ${composicion != null ? composicion : new java.util.ArrayList()}">
                  <td>
                    <select name="componenteId" class="form-select componente-select" required>
                      <option value="">Seleccione...</option>
                      <option th:each="cp : ${componentesDisponibles}" th:value="${cp.codProducto}"
                              th:text="${cp.nombreProducto}"
                              th:selected="${c.productoComponente.codProducto == cp.codProducto}">
                      </option>
                    </select>
                  </td>
                  <td>
                    <input type="number" name="componenteCantidad" class="form-control componente-cantidad"
                           th:value="${c.cantidad}" min="1" required>
                  </td>
                  <td class="precio-unitario-cell" th:text="${c.productoComponente.precioUnitario}">0.00</td>
                  <td class="subtotal-cell">0.00</td>
                  <td><button type="button" class="btn btn-sm btn-outline-danger quitar-fila">&times;</button></td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <select id="nuevoComponente" class="form-select">
                <option value="">-- Agregar componente --</option>
                <option th:each="cp : ${componentesDisponibles}" th:value="${cp.codProducto}"
                        th:text="${cp.nombreProducto + ' - S/ ' + cp.precioUnitario}"
                        th:attr="data-precio=${cp.precioUnitario}">
                </option>
              </select>
            </div>
            <div class="col-md-3">
              <input type="number" id="nuevaCantidad" class="form-control" value="1" min="1" placeholder="Cantidad">
            </div>
            <div class="col-md-3">
              <button type="button" class="btn btn-outline-primary" id="agregarComponente">Agregar</button>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-4 offset-md-8">
              <table class="table table-sm">
                <tr>
                  <td class="text-end"><strong>Subtotal componentes:</strong></td>
                  <td class="text-end" id="subtotalComps">S/ 0.00</td>
                </tr>
                <tr class="table-active">
                  <td class="text-end"><strong>Precio final del pack:</strong></td>
                  <td class="text-end" id="precioFinalPack">S/ 0.00</td>
                </tr>
              </table>
              <input type="hidden" name="precioUnitario" th:value="${producto.precioUnitario}" id="precioUnitarioHidden">
              <input type="hidden" name="precioFraccion" th:value="${producto.precioFraccion}">
              <input type="hidden" name="cantidadItem" th:value="${producto.cantidadItem}" id="cantidadItemHidden">
            </div>
          </div>
        </div>

        <div id="productoNormalSection" th:style="${producto.esPack} ? 'display:none' : ''">
          <h6 class="section-title">Precios</h6>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Precio Unitario (S/)</label>
              <div class="input-group">
                <span class="input-group-text">S/</span>
                <input type="number" step="0.01" name="precioUnitario" class="form-control"
                       th:value="${producto.precioUnitario}" required data-val="precio">
              </div>
              <div class="invalid-feedback"></div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Precio Fraccion (S/)</label>
              <div class="input-group">
                <span class="input-group-text">S/</span>
                <input type="number" step="0.01" name="precioFraccion" class="form-control"
                       th:value="${producto.precioFraccion}" required data-val="precio">
              </div>
              <div class="invalid-feedback"></div>
            </div>
          </div>

          <h6 class="section-title mt-4">Stock Inicial</h6>
          <div class="row mb-3">
            <div class="col-md-6">
              <label class="form-label">Unidades</label>
              <input type="number" name="cantidadUnidad" class="form-control"
                     th:value="${producto.cantidadUnidad}" required min="0" data-val="positivo">
              <div class="invalid-feedback"></div>
            </div>
            <div class="col-md-6">
              <label class="form-label">Fracciones</label>
              <input type="number" name="cantidadFraccion" class="form-control"
                     th:value="${producto.cantidadFraccion}" required min="0" data-val="positivo">
              <div class="invalid-feedback"></div>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary">Guardar</button>
          <a href="/productos" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>

<div th:replace="fragmentos :: scripts"></div>
<script>
(function() {
  const esPackCheck = document.getElementById('esPack');
  const packSection = document.getElementById('packSection');
  const normalSection = document.getElementById('productoNormalSection');

  function togglePackSections() {
    const isPack = esPackCheck.checked;
    packSection.style.display = isPack ? '' : 'none';
    normalSection.style.display = isPack ? 'none' : '';
    packSection.querySelectorAll('input, select, button').forEach(function(el) {
      el.disabled = !isPack;
    });
    normalSection.querySelectorAll('input, select, button').forEach(function(el) {
      el.disabled = isPack;
    });
    if (!isPack) {
      document.getElementById('composicionBody').innerHTML = '';
      recalcular();
    }
  }

  esPackCheck.addEventListener('change', togglePackSections);

  function recalcular() {
    const rows = document.querySelectorAll('#composicionBody tr');
    let subtotal = 0;
    let totalItem = 0;

    rows.forEach(function(row) {
      const select = row.querySelector('.componente-select');
      const cantidad = parseInt(row.querySelector('.componente-cantidad').value) || 0;
      const precio = parseFloat(select.options[select.selectedIndex]?.getAttribute('data-precio')) || 0;
      const sub = precio * cantidad;
      subtotal += sub;
      totalItem += cantidad;
      row.querySelector('.subtotal-cell').textContent = sub.toFixed(2);
    });

    document.getElementById('subtotalComps').textContent = 'S/ ' + subtotal.toFixed(2);
    document.getElementById('cantidadItemHidden').value = totalItem;

    document.getElementById('precioFinalPack').textContent = 'S/ ' + subtotal.toFixed(2);
    document.getElementById('precioUnitarioHidden').value = subtotal.toFixed(2);
  }

  document.getElementById('agregarComponente').addEventListener('click', function() {
    const select = document.getElementById('nuevoComponente');
    const cantidad = document.getElementById('nuevaCantidad');
    const selectedOption = select.options[select.selectedIndex];

    if (!selectedOption || !selectedOption.value) return;
    const prodId = selectedOption.value;
    const prodName = selectedOption.text.split(' - ')[0];
    const precio = parseFloat(selectedOption.getAttribute('data-precio')) || 0;
    const cant = parseInt(cantidad.value) || 1;

    if (cant < 1) return;

    const exists = Array.from(document.querySelectorAll('#composicionBody select[name="componenteId"]'))
      .some(s => s.value === prodId);
    if (exists) {
      alert('El producto ya esta en la composicion');
      return;
    }

    const tbody = document.getElementById('composicionBody');
    const tr = document.createElement('tr');
    tr.innerHTML =
      '<td>' +
      '<select name="componenteId" class="form-select componente-select" required>' +
      '<option value="">Seleccione...</option>' +
      Array.from(select.options).slice(1).map(function(o) {
        return '<option value="' + o.value + '"' + (o.value === prodId ? ' selected' : '') + '>' + o.text.split(' - ')[0] + '</option>';
      }).join('') +
      '</select>' +
      '</td>' +
      '<td><input type="number" name="componenteCantidad" class="form-control componente-cantidad" value="' + cant + '" min="1" required></td>' +
      '<td class="precio-unitario-cell">' + precio.toFixed(2) + '</td>' +
      '<td class="subtotal-cell">' + (precio * cant).toFixed(2) + '</td>' +
      '<td><button type="button" class="btn btn-sm btn-outline-danger quitar-fila">&times;</button></td>';

    tbody.appendChild(tr);
    cantidad.value = '1';
    select.selectedIndex = 0;
    bindRowEvents(tr);
    recalcular();
  });

  function bindRowEvents(row) {
    row.querySelector('.quitar-fila').addEventListener('click', function() {
      row.remove();
      recalcular();
    });
    row.querySelector('.componente-select').addEventListener('change', recalcular);
    row.querySelector('.componente-cantidad').addEventListener('input', recalcular);
  }

  document.querySelectorAll('#composicionBody tr').forEach(bindRowEvents);
  document.getElementById('nuevaCantidad').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('agregarComponente').click();
    }
  });

  togglePackSections();
  if (esPackCheck.checked) recalcular();
})();
</script>
</body>
</html>
