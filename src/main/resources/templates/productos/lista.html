<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Productos')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <div class="page-header">
    <h2>Productos</h2>
    <a href="/productos/nuevo" class="btn btn-primary">Nuevo Producto</a>
  </div>
  <div class="table-wrapper">
    <table class="table table-bordered table-hover">
      <thead>
        <tr>
          <th>Codigo</th>
          <th>Nombre</th>
          <th>Categoria</th>
          <th>P. Unitario</th>
          <th>P. Fraccion</th>
          <th>Stock Und</th>
          <th>Stock Fracc</th>
          <th>Estado</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="p : ${productos}">
          <td th:text="${p.codProducto}">1</td>
          <td th:text="${p.nombreProducto}">Producto</td>
          <td th:text="${p.categoria.nombreCategoria}">Categoria</td>
          <td th:text="${p.precioUnitario}">0.00</td>
          <td th:text="${p.precioFraccion}">0.00</td>
          <td th:text="${p.cantidadUnidad}">0</td>
          <td th:text="${p.cantidadFraccion}">0</td>
          <td>
            <span th:if="${p.estado}" class="badge bg-success">Activo</span>
            <span th:unless="${p.estado}" class="badge bg-danger">Inactivo</span>
          </td>
          <td>
            <a th:href="@{/productos/editar/{id}(id=${p.codProducto})}" class="btn btn-sm btn-outline-primary">Editar</a>
            <a th:href="@{/productos/eliminar/{id}(id=${p.codProducto})}" class="btn btn-sm btn-outline-danger"
               onclick="return confirm('Eliminar este producto?')">Eliminar</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div th:replace="fragmentos :: scripts"></div>
</body>
</html>
