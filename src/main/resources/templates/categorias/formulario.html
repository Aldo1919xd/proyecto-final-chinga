<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Categoria')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <h2 th:text="${categoria.codCategoria != null ? 'Editar Categoria' : 'Nueva Categoria'}">Formulario</h2>
      <form th:action="@{/categorias/guardar}" method="post" class="card-form">
        <input type="hidden" name="codCategoria" th:value="${categoria.codCategoria}">
        <input type="hidden" name="estado" th:value="${categoria.estado != null ? categoria.estado : true}">
        <div class="mb-3">
          <label class="form-label">Nombre Categoria</label>
          <input type="text" name="nombreCategoria" class="form-control" th:value="${categoria.nombreCategoria}" required maxlength="80">
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">Guardar</button>
          <a href="/categorias" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </div>
</div>

<div th:replace="fragmentos :: scripts"></div>
</body>
</html>
