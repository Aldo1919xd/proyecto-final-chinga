<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragmentos :: head('Permisos')">
<body>
<div th:replace="fragmentos :: navbar"></div>

<div class="container content">
  <div class="page-header">
    <h2>Permisos del Rol: <span th:text="${rol.nombreRol}">Rol</span></h2>
  </div>

  <form th:action="@{/roles/permisos/{id}/guardar(id=${rol.idRol})}" method="post">
    <div class="table-wrapper">
      <table class="table table-bordered">
        <thead>
          <tr>
            <th style="min-width: 220px">Funcionalidad</th>
            <th class="text-center">Ver</th>
            <th class="text-center">Crear</th>
            <th class="text-center">Editar</th>
            <th class="text-center">Eliminar</th>
            <th class="text-center">Imprimir</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item : ${arbol}"
              th:classappend="${item.depth > 0 ? 'tree-child' : ''}"
              th:data-parent="${item.funcionalidad.padre?.idFuncionalidad}"
              th:attr="data-depth=${item.depth}">
            <td style="padding-left: calc(1rem + 1.5rem * ${item.depth})">
              <span th:if="${item.hasChildren}" class="tree-toggle"
                    th:attr="data-target='#children-' + ${item.funcionalidad.idFuncionalidad}"
                    style="cursor:pointer; margin-right:4px; user-select:none;">
                <span class="tree-icon">&#9660;</span>
              </span>
              <span th:unless="${item.hasChildren}" style="margin-right:16px"></span>
              <span th:text="${item.funcionalidad.nombre}">Funcionalidad</span>
            </td>
            <td class="text-center">
              <input type="checkbox" name="ver" th:value="${item.funcionalidad.idFuncionalidad}"
                     th:checked="${permisosMap.containsKey(item.funcionalidad.idFuncionalidad) and permisosMap.get(item.funcionalidad.idFuncionalidad).ver}">
            </td>
            <td class="text-center">
              <input type="checkbox" name="crear" th:value="${item.funcionalidad.idFuncionalidad}"
                     th:checked="${permisosMap.containsKey(item.funcionalidad.idFuncionalidad) and permisosMap.get(item.funcionalidad.idFuncionalidad).crear}">
            </td>
            <td class="text-center">
              <input type="checkbox" name="editar" th:value="${item.funcionalidad.idFuncionalidad}"
                     th:checked="${permisosMap.containsKey(item.funcionalidad.idFuncionalidad) and permisosMap.get(item.funcionalidad.idFuncionalidad).editar}">
            </td>
            <td class="text-center">
              <input type="checkbox" name="eliminar" th:value="${item.funcionalidad.idFuncionalidad}"
                     th:checked="${permisosMap.containsKey(item.funcionalidad.idFuncionalidad) and permisosMap.get(item.funcionalidad.idFuncionalidad).eliminar}">
            </td>
            <td class="text-center">
              <input type="checkbox" name="imprimir" th:value="${item.funcionalidad.idFuncionalidad}"
                     th:checked="${permisosMap.containsKey(item.funcionalidad.idFuncionalidad) and permisosMap.get(item.funcionalidad.idFuncionalidad).imprimir}">
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div class="mt-3">
      <button type="submit" class="btn btn-primary">Aplicar</button>
      <a href="/roles" class="btn btn-secondary">Cancelar</a>
    </div>
  </form>
</div>

<script src="/js/arbol-permisos.js"></script>
<div th:replace="fragmentos :: scripts"></div>
</body>
</html>
